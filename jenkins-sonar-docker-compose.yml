version: '3.8'

# ===================================================================
# Docker Compose for Jenkins & SonarQube
# Self-Signed SSL Enabled
# ===================================================================

services:
  
  # Jenkins Service
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8443:8080"    # HTTP
      - "8444:8443"    # HTTPS
      - "50000:50000"  # JNLP
    environment:
      - JENKINS_OPTS=--httpsPort=8443 --httpsKeyStore=/etc/ssl/certs/jenkins/jenkins.p12 --httpsKeyStorePassword=changeit
      - JENKINS_SLAVE_AGENT_PORT=50000
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./ssl/jenkins:/etc/ssl/certs/jenkins
    networks:
      - jenkins-sonar-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5

  # SonarQube Database
  postgres:
    image: postgres:16-alpine
    container_name: sonarqube-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=sonar
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
    volumes:
      - sonarqube_db:/var/lib/postgresql/data
    networks:
      - jenkins-sonar-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 30s
      timeout: 10s
      retries: 5

  # SonarQube Service
  sonarqube:
    image: sonarqube:10.5.1-community
    container_name: sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"    # HTTP
      - "9001:9001"    # HTTPS
    environment:
      - SONARQUBE_JDBC_URL=jdbc:postgresql://postgres:5432/sonar
      - SONARQUBE_JDBC_USERNAME=sonar
      - SONARQUBE_JDBC_PASSWORD=sonar
      - SONAR_WEB_JAVAOPTS=-Djavax.net.ssl.keyStore=/etc/ssl/certs/sonarqube/sonarqube.p12 -Djavax.net.ssl.keyStorePassword=changeit
      - SONAR_SEARCH_JAVAOPTS=-Djavax.net.ssl.trustStore=/etc/ssl/certs/sonarqube/sonarqube.truststore
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - ./ssl/sonarqube:/etc/ssl/certs/sonarqube
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - jenkins-sonar-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 10

# Networks
networks:
  jenkins-sonar-network:
    driver: bridge

# Volumes
volumes:
  jenkins_home:
    name: jenkins_home
  sonarqube_data:
    name: sonarqube_data
  sonarqube_db:
    name: sonarqube_db
